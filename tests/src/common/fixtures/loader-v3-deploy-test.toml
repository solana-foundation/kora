[kora]
rate_limit = 100

[kora.auth]

[kora.cache]
enabled = false
default_ttl = 300
account_ttl = 60

[kora.enabled_methods]
liveness = true
estimate_transaction_fee = false
estimate_bundle_fee = false
get_supported_tokens = false
sign_transaction = true
sign_and_send_transaction = true
transfer_transaction = false
get_blockhash = true
get_config = true
get_payer_signer = true
get_version = true
sign_bundle = false
sign_and_send_bundle = false

[kora.plugins]
enabled = ["deploy_authority"]

[validation]
max_allowed_lamports = 10000000000
max_signatures = 20
price_source = "Mock"
allow_durable_transactions = false
allowed_programs = [
    "11111111111111111111111111111111",
    "BPFLoaderUpgradeab1e11111111111111111111111",
]
allowed_tokens = []
allowed_spl_paid_tokens = []
disallowed_accounts = []

[validation.price]
type = "free"

[validation.token_2022]
transfer_hook_policy = "deny_mutable_for_delayed_signing"
blocked_mint_extensions = []
blocked_account_extensions = []

[validation.fee_payer_policy]

[validation.fee_payer_policy.system]
allow_transfer = false
allow_assign = false
allow_create_account = true
allow_allocate = true

[validation.fee_payer_policy.system.nonce]
allow_initialize = false
allow_advance = false
allow_authorize = false
allow_withdraw = false

[validation.fee_payer_policy.bpf_loader_upgradeable]
allow_initialize_buffer = true
allow_write = true
allow_deploy_with_max_data_len = true
allow_upgrade = true
allow_extend_program = true
allow_set_authority = true
allow_set_authority_checked = true
allow_close = true
allow_migrate = true

[kora.usage_limit]
enabled = false
fallback_if_unavailable = false
rules = []

[kora.bundle]
enabled = false
