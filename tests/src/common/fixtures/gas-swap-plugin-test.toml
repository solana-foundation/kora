# This file is used for integration testing with the gas_swap plugin enabled
[kora]
rate_limit = 100

[kora.auth]

# Cache configuration - disabled for testing
[kora.cache]
enabled = false
default_ttl = 300
account_ttl = 60

[kora.enabled_methods]
liveness = false
estimate_transaction_fee = true
estimate_bundle_fee = true
get_supported_tokens = true
sign_transaction = true
sign_and_send_transaction = true
transfer_transaction = true
get_blockhash = true
get_config = true
get_payer_signer = true
get_version = true
sign_bundle = true
sign_and_send_bundle = true

[kora.plugins]
enabled = ["gas_swap"]

[validation]
max_allowed_lamports = 1000000
max_signatures = 10
price_source = "Mock"
allow_durable_transactions = false
allowed_programs = [
    "11111111111111111111111111111111",             # System Program
    "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",  # Token Program
    "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb",  # Token-2022 Program
    "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL", # Associated Token Program
    "AddressLookupTab1e1111111111111111111111111",  # Address Lookup Table Program
]
allowed_tokens = [
    "9BgeTKqmFsPVnfYscfM6NvsgmZxei7XfdciShQ6D3bxJ", # Test USDC mint for local testing
]
allowed_spl_paid_tokens = [
    "9BgeTKqmFsPVnfYscfM6NvsgmZxei7XfdciShQ6D3bxJ", # Test USDC mint for local testing
]

disallowed_accounts = []

[validation.price]
type = "margin"
margin = 0.0

[validation.token_2022]
transfer_hook_policy = "deny_mutable_for_delayed_signing"
blocked_mint_extensions = []
blocked_account_extensions = []

[validation.fee_payer_policy]

[validation.fee_payer_policy.system]
allow_transfer = true
allow_assign = true
allow_create_account = true
allow_allocate = true

[validation.fee_payer_policy.system.nonce]
allow_initialize = true
allow_advance = true
allow_authorize = true
allow_withdraw = true

[validation.fee_payer_policy.spl_token]
allow_transfer = true
allow_burn = true
allow_close_account = true
allow_approve = true
allow_revoke = true
allow_set_authority = true
allow_mint_to = true
allow_initialize_mint = true
allow_initialize_account = true
allow_initialize_multisig = true
allow_freeze_account = true
allow_thaw_account = true

[validation.fee_payer_policy.token_2022]
allow_transfer = true
allow_burn = true
allow_close_account = true
allow_approve = true
allow_revoke = true
allow_set_authority = true
allow_mint_to = true
allow_initialize_mint = true
allow_initialize_account = true
allow_initialize_multisig = true
allow_freeze_account = true
allow_thaw_account = true

[kora.usage_limit]
enabled = false
cache_url = "redis://redis:6379"
fallback_if_unavailable = false
rules = []

[kora.bundle]
enabled = true

[kora.bundle.jito]
block_engine_url = "mock"
simulate_bundle_url = "mock"
