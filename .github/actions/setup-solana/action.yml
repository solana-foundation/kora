name: 'Setup Solana CLI'
description: 'Install and cache Solana CLI'

runs:
  using: 'composite'
  steps:
    - name: Get current week for cache key
      id: week
      shell: bash
      run: echo "week=$(date +'%Y-W%U')" >> $GITHUB_OUTPUT

    - name: Cache Solana CLI installation
      uses: actions/cache@v4
      with:
        path: ~/.local/share/solana
        key: solana-cli-v4.0.3-${{ runner.os }}-${{ steps.week.outputs.week }}
        restore-keys: |
          solana-cli-v4.0.3-${{ runner.os }}-

    - name: Install Solana CLI
      shell: bash
      run: |
        if command -v solana &> /dev/null && solana --version | grep -q ' 4\.'; then
          echo "Solana CLI already installed"
          solana --version
          exit 0
        fi

        sh -c "$(curl -sSfL https://release.anza.xyz/v4.0.3/install)"
        echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"

        # Verify installation
        solana --version
        solana-test-validator --version