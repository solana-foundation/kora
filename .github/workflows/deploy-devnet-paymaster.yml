name: Deploy devnet paymaster

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: false
        default: main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Load deploy config from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_SERVICE_IDENTITY_ID }}
          doppler-project: ${{ vars.DOPPLER_PROJECT || 'kora' }}
          doppler-config: ${{ vars.DOPPLER_CONFIG_CI || 'stg_github' }}
          inject-env-vars: true

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: build
        env:
          REGION: ${{ env.GCP_REGION }}
          PROJECT: ${{ env.GCP_PROJECT_ID }}
          SERVICE: ${{ env.CLOUD_RUN_SERVICE }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/cloud-run-source-deploy/${SERVICE}:${GITHUB_SHA::12}"
          gcloud builds submit examples/devnet-deploy-paymaster/ \
            --tag "$IMAGE" \
            --project="$PROJECT" \
            --gcs-source-staging-dir="gs://${PROJECT}_cloudbuild/source" \
            --default-buckets-behavior=regional-user-owned-bucket
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          image: ${{ steps.build.outputs.image }}
          env_vars: |-
            RPC_URL=${{ env.DEVNET_RPC_URL }}
            KORA_GCP_KMS_KEY_NAME=${{ env.DEVNET_KORA_GCP_KMS_KEY_NAME }}
            KORA_GCP_KMS_PUBLIC_KEY=${{ env.DEVNET_KORA_GCP_KMS_PUBLIC_KEY }}
            KORA_REDIS_URL=${{ env.DEVNET_KORA_REDIS_URL }}
          env_vars_update_strategy: overwrite
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=1Gi
            --vpc-connector=${{ env.VPC_CONNECTOR }}
            --vpc-egress=private-ranges-only

      - name: Print service URL
        run: echo "Deployed ${{ env.CLOUD_RUN_SERVICE }} -> ${{ steps.deploy.outputs.url }}"
