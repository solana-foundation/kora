name: PR target branch check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check-target:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce mainline PR policy
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == release/* ]]; then
            echo "::warning::Source branch '$HEAD_REF' matches deprecated release/* flow."
            echo "::warning::Create feature/fix branches from main and open PRs to main."
          fi

          echo "Mainline PR policy check passed."
